[build]
  # O Cortes 3D (Next.js) é pré-compilado localmente e commitado em cortes/out/.
  # O Netlify só precisa buildar o frontend React/Vite e copiar o output do Cortes.
  # Isso elimina o `npm install` + `next build` no Netlify que causava OOM/crash.
  #
  # IMPORTANTE: sempre que alterar o Cortes 3D, o Replit já tem o build pronto.
  command   = "cd frontend && yarn install && yarn build && mkdir -p dist/cortes && cp -r ../cortes/out/. dist/cortes/"
  publish   = "frontend/dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION    = "22"
  NODE_OPTIONS    = "--max-old-space-size=4096"

# Kiwify webhook → Netlify Function
[[redirects]]
  from   = "/api/webhook/kiwify"
  to     = "/.netlify/functions/kiwify"
  status = 200

# ── Cortes 3D (Next.js static export) ────────────────────────────────────────
# Serve o index.html do Cortes diretamente para /cortes (sem trailing slash).
# Não usamos 301 aqui pois causaria ERR_TOO_MANY_REDIRECTS com o basePath do Next.js.
[[redirects]]
  from   = "/cortes"
  to     = "/cortes/index.html"
  status = 200
  force  = true

# /cortes/ e /cortes/* → serve o index.html do Next.js (SPA interno do Cortes)
[[redirects]]
  from   = "/cortes/*"
  to     = "/cortes/index.html"
  status = 200
  force  = true

# ── SPA fallback do React (deve ser o último) ─────────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

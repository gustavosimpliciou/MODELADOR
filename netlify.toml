[build]
  # O Cortes 3D (Next.js) é pré-compilado e commitado em cortes/out/.
  # O Netlify só precisa buildar o frontend React/Vite e copiar o output do Cortes.
  command   = "cd frontend && yarn install && yarn build && mkdir -p dist/cortes && cp -r ../cortes/out/. dist/cortes/"
  publish   = "frontend/dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION    = "22"
  NODE_OPTIONS    = "--max-old-space-size=4096"

# Kiwify webhook → Netlify Function
[[redirects]]
  from   = "/api/webhook/kiwify"
  to     = "/.netlify/functions/kiwify"
  status = 200

# ── Cortes 3D (Next.js static export) ────────────────────────────────────────
#
# REGRA CRÍTICA: NÃO usar force=true em /cortes/* pois impede o Netlify
# de servir arquivos estáticos reais (CSS, JS, fontes, imagens).
# force=true faz o Netlify ignorar arquivos existentes e sempre retornar index.html,
# quebrando completamente o carregamento de assets.
#
# /cortes (sem barra) → serve o index.html diretamente (sem 301, evita redirect loop)
[[redirects]]
  from   = "/cortes"
  to     = "/cortes/index.html"
  status = 200

# /cortes/* → SPA fallback: só atua se o arquivo NÃO existir em disco
# Arquivos reais (_next/static/css, js, fonts) são servidos diretamente pelo CDN
[[redirects]]
  from   = "/cortes/*"
  to     = "/cortes/index.html"
  status = 200

# ── SPA fallback do React (deve ser o último) ─────────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

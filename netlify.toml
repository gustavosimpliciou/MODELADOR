[build]
  # O Cortes 3D (Next.js) é pré-compilado localmente e commitado em cortes/out/.
  # O Netlify só precisa buildar o frontend React/Vite e copiar o output do Cortes.
  # Isso elimina o `npm install` + `next build` no Netlify que causava OOM/crash.
  #
  # IMPORTANTE: sempre que alterar o Cortes 3D, execute localmente:
  #   cd cortes && npm run build -- --webpack
  # e faça commit da pasta cortes/out/ antes de fazer deploy.
  command   = "cd frontend && yarn install && yarn build && mkdir -p dist/cortes && cp -r ../cortes/out/. dist/cortes/"
  publish   = "frontend/dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION    = "22"
  NODE_OPTIONS    = "--max-old-space-size=4096"

# Kiwify webhook → Netlify Function
[[redirects]]
  from   = "/api/webhook/kiwify"
  to     = "/.netlify/functions/kiwify"
  status = 200

# ── Cortes 3D (Next.js static export) ────────────────────────────────────────
# Estes dois blocos devem ficar ANTES do fallback SPA, senão o Netlify serve
# o index.html do React para qualquer rota /cortes/* e o app nunca abre.
#
# /cortes  → redireciona para /cortes/ (trailing slash) onde o index.html vive
[[redirects]]
  from   = "/cortes"
  to     = "/cortes/"
  status = 301
  force  = true

# /cortes/* → serve o index.html do Next.js (SPA interno do Cortes)
# force=false: se o arquivo existe (ex: _next/static/…) ele é servido diretamente
[[redirects]]
  from   = "/cortes/*"
  to     = "/cortes/index.html"
  status = 200

# ── SPA fallback do React (deve ser o último) ─────────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
